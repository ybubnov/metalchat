name: Homebrew Bottle

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

  workflow_dispatch:

concurrency:
  cancel-in-progress: true
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  build:
    runs-on: macos-26
    env:
      HOMEBREW_TAP: ${{ github.sha }}/metalchat

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v6

    - name: Setup oras
      uses: oras-project/setup-oras@v2

    - name: Configure a Homebrew Tap
      run: |
        brew tap-new --no-git $HOMEBREW_TAP
        rm -r $(brew --repo $HOMEBREW_TAP)
        ln -s $(pwd) $(brew --repo $HOMEBREW_TAP)

    - name: Build a Homebrew Bottle
      run: |
        brew install --build-bottle $HOMEBREW_TAP/metalchat
        brew bottle --json $HOMEBREW_TAP/metalchat

    - name: Upload Bottles to the Run
      uses: actions/upload-artifact@v7
      with:
        name: metalchat
        retention-days: 7
        path: |
          *.bottle.tar.gz
          *.bottle.json

    - name: Login to GitHub Packages
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        echo $GITHUB_TOKEN | oras login ghcr.io --username ${{ github.repository_owner }} --password-stdin

    - name: Upload Bottle to GitHub Packages
      run: |
        oras push \
          ghcr.io/${{ github.repository_owner }}/stable/metalchat:1.2.1 \
          *.bottle.tar.gz
