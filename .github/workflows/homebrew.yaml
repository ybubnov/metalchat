name: Homebrew Bottle

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

  workflow_dispatch:

concurrency:
  cancel-in-progress: true
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  build:
    runs-on: macos-26

    steps:
    - name: Checkout source code
      id: checkout
      uses: actions/checkout@v4

    - name: Build a bottle
      id: bottle
      env:
        tap: ${{ github.sha }}/metalchat
      run: |
        brew tap-new --no-git ${{ env.tap }}
        cp -r Formula $(brew --repository ${{ env.tap }})
        brew install --build-bottle ${{ env.tap }}/metalchat
        brew bottle ${{ env.tap }}/metalchat

    - name: Upload a bottle
      uses: actions/upload-artifact@v4
      id: upload
      with:
        path: ./*.bottle.tar.gz
        retention-days: 7
