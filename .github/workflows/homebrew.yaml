name: Homebrew

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

  workflow_dispatch:

concurrency:
  cancel-in-progress: true
  group: ${{ github.workflow }}-${{ github.ref }}

env:
  HOMEBREW_TAP: ${{ github.repository_owner }}/stable
  HOMEBREW_ROOT_URL: https://ghcr.io/v2/${{ github.repository_owner }}/stable

jobs:
  build_bottles:
    name: Build Bottle on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ macos-26, macos-15 ]
    permissions:
      contents: write

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v6

    - name: Configure a Homebrew Tap
      run: |
        brew tap-new --no-git $HOMEBREW_TAP
        rm -r $(brew --repo $HOMEBREW_TAP)
        ln -s $(pwd) $(brew --repo $HOMEBREW_TAP)

    - name: Build a Homebrew Bottle
      run: |
        brew install --build-bottle $HOMEBREW_TAP/metalchat
        brew bottle --root-url $HOMEBREW_ROOT_URL --json $HOMEBREW_TAP/metalchat

    - name: Upload Homebrew Artifacts
      uses: actions/upload-artifact@v7
      with:
        name: bottle-${{ matrix.os }}
        path: |
          *.bottle.tar.gz
          *.bottle.json
        retention-days: 1

  upload_bottles:
    name: Upload Bottles
    needs: [build_bottles]
    runs-on: macos-26
    permissions:
      packages: write
      contents: write
      pull-requests: write
    env:
      HOMEBREW_GITHUB_PACKAGES_USER: ${{ github.repository_owner }}
      HOMEBREW_GITHUB_PACKAGES_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
    - name: Checkout Main Branch
      uses: actions/checkout@v6
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        ref: main

    - name: Resolve Metadata
      id: metadata
      run: |
        echo "version=$(cat version.txt | tr -d '\n')" >> "$GITHUB_OUTPUT"
        echo "branch=bottle-$(cat version.txt | tr -d '\n')" >> "$GITHUB_OUTPUT"

    - name: Download Bottle Artifacts
      uses: actions/download-artifact@v8
      with:
        pattern: bottle-*
        path: bottles
        merge-multiple: true

    - name: Configure a Homebrew Tap
      run: |
        brew tap-new --no-git $HOMEBREW_TAP
        rm -r $(brew --repo $HOMEBREW_TAP)
        ln -s $(pwd) $(brew --repo $HOMEBREW_TAP)

    - name: Upload Bottles to GitHub Packages
      run: |
        cd bottles
        git checkout -b ${{ steps.metadata.outputs.branch }}
        brew pr-upload --upload-only --root-url $HOMEBREW_ROOT_URL
        brew bottle --write --merge *.bottle.json

    - name: Create PR Updating Bottle Checksums
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git push origin ${{ steps.metadata.outputs.branch }}
        gh pr create \
          --base main \
          --title "Release Homebrew bottles ${{ steps.metadata.outputs.version }}" \
          --body "This patch updates sha256 checksums of the Homebrew formula."
