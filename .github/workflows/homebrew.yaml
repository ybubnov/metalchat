name: Homebrew Bottle

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

  workflow_dispatch:

concurrency:
  cancel-in-progress: true
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  build_bottles:
    name: Build Bottles on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ macos-26 ]
    permissions:
      contents: write
    env:
      HOMEBREW_TAP: ${{ github.repository_owner }}/stable
      HOMEBREW_ROOT_URL: https://ghcr.io/v2/${{ github.repository_owner }}/stable

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v6

    - name: Configure a Homebrew Tap
      run: ln -s $(pwd) $(brew --repo $HOMEBREW_TAP)

    - name: Build a Homebrew Bottle
      run: |
        brew install --build-bottle $HOMEBREW_TAP/metalchat
        brew bottle --root-url $HOMEBREW_ROOT_URL --json $HOMEBREW_TAP/metalchat

    - name: Upload Homebrew Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: bottle-${{ matrix.os }}
        path: |
          *.bottle.tar.gz
          *.bottle.json
        retention-days: 1

  upload_bottles:
    name: Upload Bottles
    needs: [build_bottles]
    runs-on: macos-26
    permissions:
      packages: write
      pull-requests: write
    env:
      HOMEBREW_GITHUB_PACKAGES_USER: ${{ github.repository_owner }}
      HOMEBREW_GITHUB_PACKAGES_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
    - name: Checkout Main Branch
      uses: actions/checkout@v6
      with:
        ref: main

    - name: Download Bottle Artifacts
      uses: actions/download-artifact@v8
      with:
        pattern: bottle-*
        path: bottles
        merge-multiple: true

    - name: Upload Bottles to GitHub Packages
      run: |
        #brew pr-upload --upload-only --root-url $HOMEBREW_ROOT_URL
        brew bottle --write --merge bottles/*.bottle.json

    - name: Create PR Updating Bottle Checksums
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh pr create \
          --base main \
          --title "Update homebrew bottle checksums v$(cat version.txt)" \
          --body "This patch updates sha256 checksums of the Homebrew formula."
